global
    daemon

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    
frontend http_front
    bind *:80
    default_backend servers

backend servers
    mode http
    balance roundrobin
    server ngx1 ngx1:80 check
    server ngx2 ngx2:80 check
