<svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="960" height="720" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#58a6ff" letter-spacing="3">appTest — ARQUITECTURA</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ZONA DOCKER (VM Ubuntu) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="55" width="600" height="590" rx="8" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="74" font-size="11" fill="#8b949e">VM Ubuntu 24 — Docker Host</text>
  <text x="36" y="88" font-size="10" fill="#484f58">192.168.0.x (bridge)  |  192.168.56.10 (host-only)</text>

  <!-- Internet entry arrow -->
  <text x="310" y="108" text-anchor="middle" font-size="10" fill="#8b949e">INTERNET / HOST :8080</text>
  <line x1="310" y1="112" x2="310" y2="128" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- haproxy1-ssl -->
  <rect x="190" y="128" width="240" height="44" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="310" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#58a6ff">haproxy1-ssl</text>
  <text x="310" y="163" text-anchor="middle" font-size="10" fill="#8b949e">apptest-haproxy1-ssl  |  :8080→:443</text>

  <!-- ssl → int -->
  <line x1="310" y1="172" x2="310" y2="192" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- haproxy1-int -->
  <rect x="190" y="192" width="240" height="50" rx="6" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="310" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#388bfd">haproxy1-int</text>
  <text x="310" y="226" text-anchor="middle" font-size="10" fill="#8b949e">apptest-haproxy1-int  |  :443→:80</text>
  <text x="310" y="238" text-anchor="middle" font-size="10" fill="#484f58">stats :8404  |  round robin</text>

  <!-- int → java1 y java2 -->
  <line x1="260" y1="242" x2="175" y2="268" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="242" x2="445" y2="268" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- java1 -->
  <rect x="80" y="268" width="190" height="44" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="175" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">java1</text>
  <text x="175" y="303" text-anchor="middle" font-size="10" fill="#8b949e">nginx:latest  |  red interna</text>

  <!-- java2 -->
  <rect x="350" y="268" width="190" height="44" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="445" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">java2</text>
  <text x="445" y="303" text-anchor="middle" font-size="10" fill="#8b949e">nginx:latest  |  red interna</text>

  <!-- ─── REDIS ─── -->
  <rect x="30" y="342" width="560" height="110" rx="6" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="44" y="358" font-size="10" fill="#8b949e">Redis Cluster</text>

  <!-- redis-master -->
  <rect x="44" y="364" width="160" height="76" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="124" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#f78166">redis-master</text>
  <text x="124" y="396" text-anchor="middle" font-size="10" fill="#8b949e">redis:8.2.5-alpine</text>
  <text x="124" y="409" text-anchor="middle" font-size="10" fill="#484f58">auth + RDB</text>
  <text x="124" y="422" text-anchor="middle" font-size="10" fill="#484f58">vol: redis-master</text>
  <text x="124" y="435" text-anchor="middle" font-size="10" fill="#484f58">:6379 (interno)</text>

  <!-- redis-slave -->
  <rect x="224" y="364" width="160" height="76" rx="6" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="304" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa657">redis-slave</text>
  <text x="304" y="396" text-anchor="middle" font-size="10" fill="#8b949e">redis:8.2.5-alpine</text>
  <text x="304" y="409" text-anchor="middle" font-size="10" fill="#484f58">replicaof master</text>
  <text x="304" y="422" text-anchor="middle" font-size="10" fill="#484f58">vol: redis-slave</text>
  <text x="304" y="435" text-anchor="middle" font-size="10" fill="#484f58">:6379 (interno)</text>

  <!-- redis-sentinel -->
  <rect x="404" y="364" width="170" height="76" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="489" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#d2a8ff">redis-sentinel</text>
  <text x="489" y="396" text-anchor="middle" font-size="10" fill="#8b949e">bitnami/redis-sentinel</text>
  <text x="489" y="409" text-anchor="middle" font-size="10" fill="#484f58">monitor: mymaster</text>
  <text x="489" y="422" text-anchor="middle" font-size="10" fill="#484f58">:26379 (interno)</text>
  <text x="489" y="435" text-anchor="middle" font-size="10" fill="#484f58">depends_on: healthy</text>

  <!-- sentinel → master/slave arrows -->
  <line x1="404" y1="400" x2="204" y2="400" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrd)"/>
  <line x1="404" y1="408" x2="384" y2="408" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrd)"/>

  <!-- master → slave replication arrow -->
  <line x1="204" y1="395" x2="224" y2="395" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── SOLR + WEBDAV + LDAP ─── -->
  <rect x="30" y="468" width="166" height="76" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="113" y="487" text-anchor="middle" font-size="11" font-weight="bold" fill="#79c0ff">solr</text>
  <text x="113" y="501" text-anchor="middle" font-size="10" fill="#8b949e">solr:9.10.1</text>
  <text x="113" y="514" text-anchor="middle" font-size="10" fill="#484f58">:8983→:8983</text>
  <text x="113" y="527" text-anchor="middle" font-size="10" fill="#484f58">vol: /var/solr</text>

  <rect x="214" y="468" width="166" height="76" rx="6" fill="#161b22" stroke="#56d364" stroke-width="1.5"/>
  <text x="297" y="487" text-anchor="middle" font-size="11" font-weight="bold" fill="#56d364">webdav</text>
  <text x="297" y="501" text-anchor="middle" font-size="10" fill="#8b949e">httpd:2.4-alpine</text>
  <text x="297" y="514" text-anchor="middle" font-size="10" fill="#484f58">:8081→:80</text>
  <text x="297" y="527" text-anchor="middle" font-size="10" fill="#484f58">digest auth</text>

  <rect x="398" y="468" width="166" height="76" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="481" y="487" text-anchor="middle" font-size="11" font-weight="bold" fill="#e3b341">ldap</text>
  <text x="481" y="501" text-anchor="middle" font-size="10" fill="#8b949e">osixia/openldap:1.5.0</text>
  <text x="481" y="514" text-anchor="middle" font-size="10" fill="#484f58">:389/:636 (interno)</text>
  <text x="481" y="527" text-anchor="middle" font-size="10" fill="#484f58">dc=empresa,dc=com</text>

  <!-- ─── Docker network label ─── -->
  <text x="310" y="566" text-anchor="middle" font-size="10" fill="#484f58">red interna Docker: apptest_default</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ZONA HOST-ONLY NETWORK -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="595" width="920" height="110" rx="8" fill="none" stroke="#f78166" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="614" font-size="11" fill="#f78166">VirtualBox Host-Only Network — 192.168.56.0/24</text>

  <!-- Windows host node -->
  <rect x="36" y="624" width="160" height="70" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="116" y="643" text-anchor="middle" font-size="11" font-weight="bold" fill="#58a6ff">Windows host</text>
  <text x="116" y="658" text-anchor="middle" font-size="10" fill="#8b949e">192.168.56.1</text>
  <text x="116" y="672" text-anchor="middle" font-size="10" fill="#484f58">SSH / SQL Developer</text>
  <text x="116" y="685" text-anchor="middle" font-size="10" fill="#484f58">VirtualBox host</text>

  <!-- Ubuntu node (host-only) -->
  <rect x="350" y="624" width="200" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="643" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950">VM Ubuntu 24</text>
  <text x="450" y="658" text-anchor="middle" font-size="10" fill="#8b949e">192.168.56.10</text>
  <text x="450" y="672" text-anchor="middle" font-size="10" fill="#484f58">gateway / IP forwarding</text>
  <text x="450" y="685" text-anchor="middle" font-size="10" fill="#484f58">NAT masquerading</text>

  <!-- Oracle node -->
  <rect x="700" y="624" width="220" height="70" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="810" y="643" text-anchor="middle" font-size="11" font-weight="bold" fill="#f78166">VM Oracle Linux 8</text>
  <text x="810" y="658" text-anchor="middle" font-size="10" fill="#8b949e">192.168.56.20</text>
  <text x="810" y="672" text-anchor="middle" font-size="10" fill="#484f58">Oracle 23ai Free  |  :1521</text>
  <text x="810" y="685" text-anchor="middle" font-size="10" fill="#484f58">SID: FREE  |  PDB: FREEPDB1</text>

  <!-- host-only connections -->
  <line x1="196" y1="659" x2="350" y2="659" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="659" x2="700" y2="659" stroke="#f78166" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="625" y="653" text-anchor="middle" font-size="9" fill="#f78166">:1521</text>

  <!-- Ubuntu Docker → host-only vertical connector -->
  <line x1="450" y1="620" x2="450" y2="595" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Internet arrow from Ubuntu -->
  <text x="140" y="585" font-size="9" fill="#484f58">→ internet (bridge enp0s3)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PENDIENTES -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="638" y="55" width="302" height="130" rx="8" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="654" y="74" font-size="10" fill="#484f58">Pendiente de migración</text>

  <rect x="654" y="84" width="270" height="44" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="789" y="103" text-anchor="middle" font-size="11" fill="#484f58">Active MQ</text>
  <text x="789" y="119" text-anchor="middle" font-size="10" fill="#3a3f47">por definir</text>

  <rect x="654" y="136" width="270" height="44" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="789" y="155" text-anchor="middle" font-size="11" fill="#484f58">Adobe LC</text>
  <text x="789" y="171" text-anchor="middle" font-size="10" fill="#3a3f47">por definir</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>
  </defs>

</svg>
